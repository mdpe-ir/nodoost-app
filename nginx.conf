server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip برای کاهشِ حجمِ بارگذاری
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # داراییِ ساخته‌شده با hash در نام → کشِ طولانی
    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # خروجیِ static اکسپو برای هر مسیر یک .html می‌سازد؛
    # اگر نبود، به index.html برمی‌گردیم (رفتارِ SPA).
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
