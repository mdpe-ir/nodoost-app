server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip برای کاهشِ حجمِ بارگذاری
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # داراییِ ساخته‌شده با hash در نام → کشِ طولانی
    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # سرویس‌ورکر هرگز نباید کش شود، وگرنه به‌روزرسانیِ PWA گیر می‌کند.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # سندهای HTML باید هر بار اعتبارسنجی شوند تا PWA به باندل تازه اشاره کند.
    location ~ \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /index.html =404;
    }

    # manifest با content-type درست و کشِ کوتاه.
    location = /manifest.json {
        types { } default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # آیکون‌های PWA → کشِ طولانی.
    location /icons/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # خروجیِ static اکسپو برای هر مسیر یک .html می‌سازد؛
    # اگر نبود، به index.html برمی‌گردیم (رفتارِ SPA).
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
